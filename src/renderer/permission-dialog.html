<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>permission-dialog</title>
<style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 320px;
    height: 80px;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    font-family: 'Segoe UI', 'Meiryo', sans-serif;
  }
 #container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: 318px;
    height: 78px;
    background: rgba(20, 20, 30, 0.92);
    border-radius: 12px;
    border: 1px solid rgba(120, 120, 180, 0.4);
    padding: 8px 12px;
    margin: 1px;
  }
 #message {
    font-size: 12px;
    color: #e0e0f0;
    text-align: center;
    line-height: 1.3;
    max-width: 290px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
 #buttons {
    display: flex;
    gap: 10px;
  }
  button {
    padding: 3px 14px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:active { opacity: 0.7; }
  button:focus { outline: 2px solid rgba(180, 180, 255, 0.7); outline-offset: 2px; }
 #btn-allow {
    background: #3a9d5c;
    color: #fff;
  }
 #btn-deny {
    background: #c0392b;
    color: #fff;
  }
</style>
</head>
<body>
<div id="container">
  <div id="message" data-i18n="permission.dialog.loading">読み込み中...</div>
  <div id="buttons">
    <button id="btn-allow" tabindex="1" data-i18n="permission.dialog.allow_btn">&#10003; いいよ</button>
    <button id="btn-deny" tabindex="2" data-i18n="permission.dialog.deny_btn">&#10007; やめて</button>
  </div>
</div>
<script>
  (function () {
 // ─── i18n (インライン実装) ──────────────────────────────────
    var _dict = {};
    var _fallback = {};
    function t(key, params) {
      var str = _dict[key];
      if (str === undefined || str === null) str = _fallback[key];
      if (str === undefined || str === null) str = key;
      if (params) {
        str = str.replace(/\{(\w+)\}/g, function(_, k) {
          var v = params[k];
          return (v !== undefined && v !== null) ? String(v) : '{' + k + '}';
        });
      }
      return str;
    }
    function hydrateI18n() {
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
    }

    const msgEl = document.getElementById('message');
    const btnAllow = document.getElementById('btn-allow');
    const btnDeny = document.getElementById('btn-deny');

    let decided = false;

    function sendDecision(decision) {
      if (decided) return;
      decided = true;
      btnAllow.disabled = true;
      btnDeny.disabled = true;
      if (window.kurotanPermissionBridge) {
        window.kurotanPermissionBridge.sendDecision(decision);
      }
      setTimeout(() => window.close(), 150);
    }

    btnAllow.addEventListener('click', () => sendDecision('allow'));
    btnDeny.addEventListener('click', () => sendDecision('deny'));

 // キーボードショートカット: Y/Enter → allow、N/Esc → deny
 // e.preventDefault() でボタンのデフォルト click イベントと二重発火を防ぐ
    window.addEventListener('keydown', (e) => {
      if (decided) return;
      const key = e.key.toLowerCase();
      if (key === 'y' || key === 'enter') {
        e.preventDefault();
        sendDecision('allow');
      } else if (key === 'n' || key === 'escape') {
        e.preventDefault();
        sendDecision('deny');
      }
    });

 // preload から初期化データを受け取る
    if (window.kurotanPermissionBridge) {
      window.kurotanPermissionBridge.onInit(function (data) {
 // i18n 辞書が渡された場合は hydrate
        if (data && data._i18nDict) {
          _dict = data._i18nDict;
          _fallback = data._i18nFallbackDict || {};
          hydrateI18n();
        }
        const toolName = data.toolName || 'ツール';
        const cmd = data.toolInput && data.toolInput.command
          ? String(data.toolInput.command).slice(0, 40)
          : toolName;
        msgEl.textContent = t('permission.dialog.confirm', { cmd: cmd });
 // allow ボタンに focus（Enter で即承認されないよう keydown ハンドラで制御）
        btnAllow.focus();
      });
    } else {
      msgEl.textContent = t('permission.dialog.bridge_missing');
    }
  })();
</script>
</body>
</html>
